<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiny App</title>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      runExportedApp({
        id: "root",
        appEngine: "r",
        relPath: "",
      });
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  <style>.app-preloader{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-family:sans-serif;z-index:9999;transition:opacity .5s}.app-preloader h1{font-size:28px;font-weight:300;margin-bottom:10px}.app-preloader p{font-size:15px;opacity:.85;margin-bottom:30px}.preloader-bar{width:260px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}.preloader-bar-fill{height:100%;width:30%;background:white;border-radius:2px;animation:preload-slide 1.5s ease-in-out infinite}@keyframes preload-slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}.app-preloader.hidden{opacity:0;pointer-events:none}</style>
</head>
  <body>
<div class="app-preloader" id="preloader"><h1>Statistical Analysis App</h1><p>Loading R environment in your browser...</p><div class="preloader-bar"><div class="preloader-bar-fill"></div></div><p style="font-size:12px;opacity:.6">First load may take 15-30s. No data leaves your browser.</p></div>

    
    <div style="height: 100vh; width: 100vw" id="root"></div>
    
  <script>const _o=new MutationObserver(function(){const r=document.getElementById("root");if(r&&r.children.length>0){const p=document.getElementById("preloader");if(p){p.classList.add("hidden");setTimeout(()=>p.remove(),600)}_o.disconnect()}});_o.observe(document.getElementById("root"),{childList:true,subtree:true});</script>
</body>
</html>
